<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Mirrors the navbar .brand-mark: blue->indigo gradient rounded square
       (linear-gradient(135deg, #2563eb, #6366f1)) with a white geo-alt-fill
       location pin (the same bsicons glyph used in the header). -->
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="32" height="32" rx="7" fill="url(#brandGrad)"/>
  <g transform="translate(6.4 5.2) scale(1.2)" fill="#ffffff">
    <path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10m0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6"/>
  </g>
</svg>
